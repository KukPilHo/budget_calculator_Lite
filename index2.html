<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에이블런 인재키움 프리미엄 훈련 환급비 계산</title>
    <meta name="description" content="1년간 임금총액과 업종을 입력하면 환급 한도를 산출합니다.">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <style>
        /* 모든 디자인이 #ablearn-calculator 안에서만 작동하도록 스코프 */
        #ablearn-calculator {
            --bg: #fafafb;
            --surface: #ffffff;
            --ink: #1a1a1f;
            --ink-muted: #6a6a73;
            --line: #e7e7ec;
            --line-soft: #f1f1f5;
            --accent: #4f46e5;
            --accent-dark: #4338ca;
            --accent-soft: #eef2ff;
            --accent-line: #c7d2fe;
            --warn-bg: #fef7e6;
            --warn-ink: #8a5a00;
            --warn-line: #e8c97a;
            --info-bg: #f4f4f7;
            --info-ink: #525258;
            --error: #c53030;

            background: var(--bg);
            color: var(--ink);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 32px 20px 80px;
        }

        #ablearn-calculator * {
            box-sizing: border-box;
        }

        #ablearn-calculator .container {
            max-width: 580px;
            margin: 0 auto;
        }

        /* Header */
        #ablearn-calculator header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--line);
        }

        #ablearn-calculator .logo {
            height: 28px;
            width: auto;
            margin-bottom: 18px;
            display: block;
        }

        #ablearn-calculator .brand-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 14px;
        }

        #ablearn-calculator h1 {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.35;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            color: var(--ink);
        }

        #ablearn-calculator h1 .accent {
            color: var(--accent);
        }

        #ablearn-calculator .subtitle {
            font-size: 14px;
            color: var(--ink-muted);
            line-height: 1.6;
        }

        /* Form */
        #ablearn-calculator .form {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        #ablearn-calculator .field {
            margin-bottom: 22px;
        }

        #ablearn-calculator .field:last-child {
            margin-bottom: 0;
        }

        #ablearn-calculator .label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--ink);
        }

        #ablearn-calculator .label .required {
            color: var(--error);
            margin-left: 2px;
        }

        #ablearn-calculator .input,
        #ablearn-calculator .select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            background: var(--surface);
            color: var(--ink);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        #ablearn-calculator .input:focus,
        #ablearn-calculator .select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        #ablearn-calculator .input:disabled {
            background: var(--line-soft);
            color: var(--ink-muted);
            cursor: not-allowed;
        }

        #ablearn-calculator .input-with-suffix {
            position: relative;
        }

        #ablearn-calculator .input-with-suffix .input {
            padding-right: 44px;
        }

        #ablearn-calculator .input-suffix {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--ink-muted);
            pointer-events: none;
        }

        #ablearn-calculator .input-helper {
            font-size: 12px;
            color: var(--ink-muted);
            margin-top: 6px;
            min-height: 18px;
        }

        #ablearn-calculator .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 10px;
            padding: 12px;
            background: var(--info-bg);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        #ablearn-calculator .checkbox-row:hover {
            background: #ebebef;
        }

        #ablearn-calculator .checkbox-row input[type="checkbox"] {
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        #ablearn-calculator .checkbox-row label {
            flex: 1;
            font-size: 13px;
            color: var(--ink);
            cursor: pointer;
            line-height: 1.5;
        }

        #ablearn-calculator .checkbox-row .hint {
            color: var(--ink-muted);
            font-size: 12px;
            margin-top: 2px;
        }

        #ablearn-calculator .button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            letter-spacing: -0.01em;
            box-shadow: 0 1px 2px rgba(79, 70, 229, 0.1);
        }

        #ablearn-calculator .button:hover {
            background: var(--accent-dark);
        }

        #ablearn-calculator .button:active {
            transform: scale(0.99);
        }

        #ablearn-calculator .button:disabled {
            background: #b8b8b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        #ablearn-calculator .error-text {
            color: var(--error);
            font-size: 13px;
            margin-top: 8px;
        }

        /* Result */
        #ablearn-calculator .result {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 28px 24px;
            margin-top: 16px;
            opacity: 0;
            animation: ablearn-fadeIn 0.4s ease forwards;
        }

        @keyframes ablearn-fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #ablearn-calculator .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }

        #ablearn-calculator .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        #ablearn-calculator .badge-priority {
            background: var(--accent-soft);
            color: var(--accent-dark);
        }

        #ablearn-calculator .badge-non-priority {
            background: var(--info-bg);
            color: var(--info-ink);
        }

        #ablearn-calculator .badge-rate {
            background: var(--line-soft);
            color: var(--info-ink);
        }

        #ablearn-calculator .info-line {
            font-size: 14px;
            color: var(--ink-muted);
            margin-bottom: 4px;
        }

        #ablearn-calculator .info-line strong {
            color: var(--ink);
            font-weight: 600;
        }

        #ablearn-calculator .divider {
            border: none;
            border-top: 1px solid var(--line);
            margin: 20px 0;
        }

        #ablearn-calculator .result-label {
            font-size: 13px;
            color: var(--ink-muted);
            margin-bottom: 6px;
        }

        #ablearn-calculator .result-amount {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--accent);
            margin-bottom: 2px;
        }

        #ablearn-calculator .result-amount-range {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
            color: var(--accent);
        }

        #ablearn-calculator .result-avg {
            font-size: 13px;
            color: var(--ink-muted);
            margin-top: 4px;
        }

        #ablearn-calculator .notice {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.55;
        }

        #ablearn-calculator .notice-warn {
            background: var(--warn-bg);
            color: var(--warn-ink);
            border-left: 3px solid var(--warn-line);
        }

        #ablearn-calculator .notice-info {
            background: var(--info-bg);
            color: var(--info-ink);
            border-left: 3px solid #c0c0c8;
        }

        #ablearn-calculator .notice-accent {
            background: var(--accent-soft);
            color: var(--accent-dark);
            border-left: 3px solid var(--accent);
        }

        #ablearn-calculator .notice strong {
            font-weight: 600;
        }

        #ablearn-calculator .notice ul {
            margin-left: 18px;
            margin-top: 6px;
        }

        #ablearn-calculator .notice li {
            margin-bottom: 3px;
        }

        #ablearn-calculator .notice .check-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            color: var(--accent-dark);
            font-weight: 600;
            text-decoration: none;
            font-size: 13px;
        }

        #ablearn-calculator .notice .check-link:hover {
            text-decoration: underline;
        }

        /* Breakdown */
        #ablearn-calculator .breakdown-toggle {
            background: none;
            border: none;
            color: var(--ink-muted);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            padding: 14px 0;
            margin-top: 12px;
            width: 100%;
            text-align: left;
            border-top: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 500;
        }

        #ablearn-calculator .breakdown-toggle:hover {
            color: var(--ink);
        }

        #ablearn-calculator .breakdown-toggle .chevron {
            transition: transform 0.2s;
            font-size: 11px;
        }

        #ablearn-calculator .breakdown-toggle.open .chevron {
            transform: rotate(180deg);
        }

        #ablearn-calculator .breakdown {
            display: none;
            padding: 8px 0 4px;
        }

        #ablearn-calculator .breakdown.open {
            display: block;
        }

        #ablearn-calculator .breakdown-step {
            display: grid;
            grid-template-columns: 24px 1fr;
            gap: 12px;
            padding: 8px 0;
            font-size: 13px;
        }

        #ablearn-calculator .breakdown-step .step-num {
            color: var(--accent);
            font-weight: 600;
        }

        #ablearn-calculator .breakdown-step .step-content {
            color: var(--ink);
            font-weight: 500;
        }

        #ablearn-calculator .breakdown-step .step-formula {
            color: var(--ink-muted);
            margin-top: 2px;
            font-weight: 400;
            font-variant-numeric: tabular-nums;
        }

        #ablearn-calculator .breakdown-source {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px dashed var(--line);
            font-size: 11px;
            color: var(--ink-muted);
            line-height: 1.6;
        }

        /* CTA */
        #ablearn-calculator .cta {
            margin-top: 24px;
        }

        #ablearn-calculator .cta-button {
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 15px 16px;
            background: var(--ink) !important;
            color: #ffffff !important;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.15s;
            letter-spacing: -0.01em;
        }

        #ablearn-calculator .cta-button:hover {
            background: #2d2d35 !important;
        }

        /* Footer */
        #ablearn-calculator .footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--line);
            font-size: 11px;
            color: var(--ink-muted);
            line-height: 1.7;
        }

        #ablearn-calculator .footer p {
            margin-bottom: 4px;
        }

        #ablearn-calculator .footer strong {
            color: var(--ink);
            font-weight: 500;
        }

        /* Mobile */
        @media (max-width: 480px) {
            #ablearn-calculator {
                padding: 24px 16px 60px;
            }

            #ablearn-calculator h1 {
                font-size: 21px;
            }

            #ablearn-calculator .form {
                padding: 20px;
            }

            #ablearn-calculator .result {
                padding: 24px 20px;
            }

            #ablearn-calculator .result-amount {
                font-size: 32px;
            }

            #ablearn-calculator .result-amount-range {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <!-- 아임웹 충돌 방지: 모든 요소를 #ablearn-calculator 스코프 안에 격리 -->
    <div id="ablearn-calculator">
        <div class="container">

            <header>
                <img class="logo" src="https://cdn.imweb.me/upload/S202101041a4e45576971e/77969588714c1.png" alt="에이블런"
                    onerror="this.style.display='none';">
                <span class="brand-tag">인재키움 프리미엄 훈련</span>
                <h1>환급비 <span class="accent">한도 계산기</span></h1>
                <p class="subtitle">업종과 임금총액을 입력하면 환급 한도를 산출합니다.<br>임금을 모르는 경우 통계 기반 추정값을 보여드립니다.</p>
            </header>

            <form class="form" id="calc-form" onsubmit="return false;">

                <div class="field">
                    <label class="label" for="business-no">사업자등록번호 (선택)</label>
                    <div class="input-with-suffix" style="display: flex; gap: 8px;">
                        <input class="input" type="text" id="business-no" placeholder="예: 1234567890 (10자리 숫자)"
                            maxlength="12">
                        <button type="button" id="api-fetch-btn" class="button"
                            style="width: auto; padding: 12px 16px; white-space: nowrap;">자동 채움</button>
                    </div>
                    <div class="input-helper" id="business-helper">입력 시 상시근로자 수와 업종이 자동 입력됩니다.</div>
                </div>

                <div class="field">
                    <label class="label" for="industry">업종 (한국표준산업분류)<span class="required">*</span></label>
                    <select class="select" id="industry" required>
                        <option value="">업종을 선택하세요</option>
                    </select>
                </div>

                <div class="field">
                    <label class="label" for="employees">상시근로자 수<span class="required">*</span></label>
                    <div class="input-with-suffix">
                        <input class="input" type="number" id="employees" min="1" placeholder="예: 30" required>
                        <span class="input-suffix">명</span>
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="wage">1년간 임금총액 (총보수총액)<span class="required"
                            id="wage-required">*</span></label>
                    <div class="input-with-suffix">
                        <input class="input" type="text" id="wage" inputmode="numeric" placeholder="예: 1,500,000,000">
                        <span class="input-suffix">원</span>
                    </div>
                    <div class="input-helper" id="wage-helper"></div>

                    <div class="checkbox-row">
                        <input type="checkbox" id="estimate-mode">
                        <label for="estimate-mode">
                            임금총액을 모르겠어요. 추정값으로 계산
                            <div class="hint">통계 기반 추정값으로 계산합니다 (오차 큼)</div>
                        </label>
                    </div>
                </div>

                <button class="button" id="submit-btn" type="submit">한도 계산하기</button>
                <div class="error-text" id="error-msg" style="display:none;"></div>
            </form>

            <div id="result-container"></div>

            <footer class="footer">
                <p>본 계산기는 <strong>추정값</strong>을 제공하며, 실제 환급액은 한국산업인력공단의 심사 결과에 따라 달라질 수 있습니다.</p>
                <p>근거: 고용보험법 시행령 제12조 및 별표 1, 한국산업인력공단 사업주직업능력개발훈련 환급 안내</p>
                <p style="margin-top:10px;">© 에이블런 (Ablearn)</p>
            </footer>

        </div>
    </div><!-- /#ablearn-calculator -->

    <script>
        // ============================================================
        // 데이터
        // ============================================================

        const INDUSTRY_CATEGORIES = [
            { code: "A", name: "농업, 임업 및 어업" },
            { code: "B", name: "광업" },
            { code: "C", name: "제조업" },
            { code: "D", name: "전기, 가스, 증기 및 공기조절 공급업" },
            { code: "E", name: "수도, 하수 및 폐기물 처리, 원료 재생업" },
            { code: "F", name: "건설업" },
            { code: "G", name: "도매 및 소매업" },
            { code: "H", name: "운수 및 창고업" },
            { code: "I", name: "숙박 및 음식점업" },
            { code: "J", name: "정보통신업" },
            { code: "K", name: "금융 및 보험업" },
            { code: "L", name: "부동산업" },
            { code: "M", name: "전문, 과학 및 기술 서비스업" },
            { code: "N", name: "사업시설 관리, 사업 지원 및 임대 서비스업" },
            { code: "O", name: "공공행정, 국방 및 사회보장 행정" },
            { code: "P", name: "교육 서비스업" },
            { code: "Q", name: "보건업 및 사회복지 서비스업" },
            { code: "R", name: "예술, 스포츠 및 여가관련 서비스업" },
            { code: "S", name: "협회 및 단체, 수리 및 기타 개인 서비스업" },
            { code: "T", name: "가구 내 고용활동 및 달리 분류되지 않은 자가소비 생산활동" },
            { code: "U", name: "국제 및 외국기관" }
        ];

        // 우선지원대상기업 판정 기준 (고용보험법 시행령 제12조 별표 1)
        const PRIORITY_THRESHOLD = {
            "C": 500, "B": 300, "F": 300, "H": 300,
            "J": 300, "G": 200, "I": 200, "K": 200
        };
        const PRIORITY_DEFAULT = 100;

        // 업종별 평균 월 임금 (사업체노동력조사 2025년 기준)
        const WAGE_MATRIX = {
            "A": { "300under": 2902000, "300over": 5110000 },
            "B": { "300under": 4145000, "300over": 7300000 },
            "C": { "300under": 3714000, "300over": 6541000 },
            "D": { "300under": 4818000, "300over": 8485000 },
            "E": { "300under": 3316000, "300over": 5840000 },
            "F": { "300under": 3150000, "300over": 5548000 },
            "G": { "300under": 3150000, "300over": 5548000 },
            "H": { "300under": 2902000, "300over": 5110000 },
            "I": { "300under": 1859000, "300over": 3273000 },
            "J": { "300under": 4502000, "300over": 7929000 },
            "K": { "300under": 6160000, "300over": 10849000 },
            "L": { "300under": 2902000, "300over": 5110000 },
            "M": { "300under": 3145000, "300over": 5300000 },
            "N": { "300under": 2345000, "300over": 4130000 },
            "O": { "300under": 3482000, "300over": 6132000 },
            "P": { "300under": 3316000, "300over": 5840000 },
            "Q": { "300under": 3316000, "300over": 5840000 },
            "R": { "300under": 2487000, "300over": 4380000 },
            "S": { "300under": 2653000, "300over": 4672000 },
            "T": { "300under": 2073000, "300over": 3650000 },
            "U": { "300under": 4145000, "300over": 7300000 }
        };

        const ESTIMATE_MIN_FACTOR = 0.6;
        const ESTIMATE_MAX_FACTOR = 1.4;

        const CONSULT_URL = "https://forms.gle/e32g6V1CRwZRJgQj8";
        const PRIORITY_CHECK_URL = "https://drive.google.com/file/d/1GfNrNPauJSArg7P71G_WKV7tUbqDDbup/view?usp=drive_link";

        // ============================================================
        // 핵심 계산 로직
        // ============================================================

        function isPriorityCompany(industryCode, employeeCount) {
            const threshold = PRIORITY_THRESHOLD[industryCode] ?? PRIORITY_DEFAULT;
            return employeeCount <= threshold;
        }

        function getInsuranceRate(industryCode, employeeCount) {
            if (employeeCount >= 1000) {
                return { rate: 0.0085, label: "1,000인 이상 0.85%" };
            }
            if (employeeCount >= 150) {
                if (isPriorityCompany(industryCode, employeeCount)) {
                    return { rate: 0.0045, label: "150인 이상 우선지원대상 0.45%" };
                }
                return { rate: 0.0065, label: "150인 이상 1,000인 미만 0.65%" };
            }
            return { rate: 0.0025, label: "150인 미만 0.25%" };
        }

        function estimateAnnualWageTotal(industryCode, employeeCount) {
            const matrix = WAGE_MATRIX[industryCode];
            if (!matrix) return null;
            const scale = employeeCount >= 300 ? "300over" : "300under";
            const monthly = matrix[scale];
            const point = monthly * 12 * employeeCount;
            return {
                min: Math.round(point * ESTIMATE_MIN_FACTOR),
                avg: point,
                max: Math.round(point * ESTIMATE_MAX_FACTOR)
            };
        }

        function calculateLimit({ industryCode, employeeCount, annualWageTotal, estimateMode }) {
            const industry = INDUSTRY_CATEGORIES.find(c => c.code === industryCode);
            const rateInfo = getInsuranceRate(industryCode, employeeCount);
            const isPriority = isPriorityCompany(industryCode, employeeCount);

            const result = {
                industryCode,
                industryName: industry.name,
                employeeCount,
                isPriority,
                rate: rateInfo.rate,
                rateLabel: rateInfo.label,
                notices: []
            };

            if (estimateMode) {
                const range = estimateAnnualWageTotal(industryCode, employeeCount);
                const calc = (wage) => {
                    const premium = wage * rateInfo.rate;
                    return isPriority ? Math.max(premium * 2.4, 5000000) : premium;
                };

                result.mode = "estimate";
                result.estimatedWageRange = range;
                result.estimatedLimitRange = {
                    min: Math.round(calc(range.min)),
                    avg: Math.round(calc(range.avg)),
                    max: Math.round(calc(range.max))
                };
                result.appliedLimit = result.estimatedLimitRange.avg;

                const avgPremium = range.avg * rateInfo.rate;
                result.isMinimumGuaranteeApplied = isPriority && (avgPremium * 2.4 < 5000000);

                result.breakdown = [
                    { label: "추정 임금총액 (평균)", formula: formatKRW(range.avg) + " (" + formatKRWShort(range.avg) + ")" },
                    { label: "적용 보험요율", formula: rateInfo.label },
                    { label: "고용안정직능 보험료 (평균)", formula: formatKRW(range.avg) + " × " + (rateInfo.rate * 100).toFixed(2) + "% = " + formatKRW(Math.round(avgPremium)) },
                    isPriority
                        ? { label: "240% 한도 적용", formula: formatKRW(Math.round(avgPremium)) + " × 2.4 = " + formatKRW(Math.round(avgPremium * 2.4)) }
                        : { label: "100% 한도 적용 (비우선지원)", formula: formatKRW(Math.round(avgPremium)) },
                    { label: "최종 환급 한도 (평균)", formula: formatKRW(result.appliedLimit) }
                ];

            } else {
                const wage = annualWageTotal;
                const insurancePremium = wage * rateInfo.rate;
                let limit;
                let isMinimumGuaranteeApplied = false;

                if (isPriority) {
                    const limit240 = insurancePremium * 2.4;
                    if (limit240 < 5000000) {
                        limit = 5000000;
                        isMinimumGuaranteeApplied = true;
                    } else {
                        limit = limit240;
                    }
                } else {
                    limit = insurancePremium;
                }

                result.mode = "precise";
                result.annualWageTotal = wage;
                result.insurancePremium = Math.round(insurancePremium);
                result.appliedLimit = Math.round(limit);
                result.isMinimumGuaranteeApplied = isMinimumGuaranteeApplied;

                const breakdown = [
                    { label: "1년간 임금총액", formula: formatKRW(wage) + " (" + formatKRWShort(wage) + ")" },
                    { label: "적용 보험요율", formula: rateInfo.label },
                    { label: "고용안정직능 보험료", formula: formatKRW(wage) + " × " + (rateInfo.rate * 100).toFixed(2) + "% = " + formatKRW(Math.round(insurancePremium)) }
                ];
                if (isPriority) {
                    breakdown.push({ label: "240% 한도", formula: formatKRW(Math.round(insurancePremium)) + " × 2.4 = " + formatKRW(Math.round(insurancePremium * 2.4)) });
                    if (isMinimumGuaranteeApplied) {
                        breakdown.push({ label: "최소 보장 적용", formula: formatKRW(Math.round(insurancePremium * 2.4)) + " < 5,000,000원 → 5,000,000원으로 상향" });
                    }
                } else {
                    breakdown.push({ label: "100% 한도 (비우선지원)", formula: formatKRW(Math.round(insurancePremium)) });
                }
                breakdown.push({ label: "최종 환급 한도", formula: formatKRW(result.appliedLimit) });
                result.breakdown = breakdown;
            }

            return result;
        }

        // ============================================================
        // 포맷팅
        // ============================================================

        function formatKRW(n) {
            return n.toLocaleString("ko-KR") + "원";
        }

        function formatKRWShort(n) {
            if (n >= 100000000) {
                return Number((n / 100000000).toFixed(2)).toString() + "억원";
            }
            if (n >= 10000) {
                return Math.round(n / 10000).toLocaleString("ko-KR") + "만원";
            }
            return n.toLocaleString("ko-KR") + "원";
        }

        function parseKRW(s) {
            return parseInt(String(s).replace(/[^0-9]/g, ""), 10) || 0;
        }

        // ============================================================
        // UI 초기화
        // ============================================================

        document.addEventListener("DOMContentLoaded", () => {
            // 업종 드롭다운
            const industrySelect = document.getElementById("industry");
            INDUSTRY_CATEGORIES.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.code;
                opt.textContent = c.code + " - " + c.name;
                industrySelect.appendChild(opt);
            });

            // 사업자등록번호 API 자동 채움
            const bizInput = document.getElementById("business-no");
            const fetchBtn = document.getElementById("api-fetch-btn");
            const bizHelper = document.getElementById("business-helper");

            fetchBtn.addEventListener("click", async () => {
                let bizNo = bizInput.value.replace(/[^0-9]/g, "");
                if (bizNo.length !== 10) {
                    bizHelper.textContent = "10자리 사업자등록번호를 정확히 입력해주세요.";
                    bizHelper.style.color = "var(--error)";
                    return;
                }

                bizHelper.textContent = "조회 중...";
                bizHelper.style.color = "var(--ink-muted)";
                fetchBtn.disabled = true;

                try {
                    const API_KEY = "50e5381a34dc2b9bcdfa479630714a1d2f000832482004b641955551b529e3c3";
                    const url = new URL("https://apis.data.go.kr/B490001/gySjbPstateInfoService/getGySjBoheomBsshItem");
                    url.searchParams.append("serviceKey", decodeURIComponent(API_KEY));
                    url.searchParams.append("pageNo", "1");
                    url.searchParams.append("numOfRows", "10");
                    url.searchParams.append("resultType", "json");
                    url.searchParams.append("v_saeopjaDrno", bizNo);

                    const response = await fetch(url.toString());
                    const text = await response.text();

                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, "text/xml");
                    const items = xml.getElementsByTagName("item");

                    if (items.length === 0) {
                        bizHelper.textContent = "조회된 사업장 정보가 없습니다. 직접 입력해주세요.";
                        bizHelper.style.color = "var(--warn-ink)";
                        fetchBtn.disabled = false;
                        return;
                    }

                    let inwon = "", eopjongCd = "", saeopjangNm = "";

                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        const gyCd = item.getElementsByTagName("gyEopjongCd")[0]?.textContent;
                        if (!inwon) inwon = item.getElementsByTagName("sangsiInwonCnt")[0]?.textContent;
                        if (!saeopjangNm) saeopjangNm = item.getElementsByTagName("saeopjangNm")[0]?.textContent;
                        if (gyCd) { eopjongCd = gyCd; break; }
                    }

                    // 고용보험 코드 없을 때 산재보험 코드로 폴백 (매핑 부정확 가능)
                    if (!eopjongCd && items.length > 0) {
                        eopjongCd = items[0].getElementsByTagName("sjEopjongCd")[0]?.textContent;
                    }

                    if (inwon) document.getElementById("employees").value = inwon;

                    if (eopjongCd && eopjongCd.length >= 2) {
                        const prefix = parseInt(eopjongCd.substring(0, 2), 10);
                        let category = "";
                        if (prefix >= 1 && prefix <= 3) category = "A";
                        else if (prefix >= 5 && prefix <= 8) category = "B";
                        else if (prefix >= 10 && prefix <= 34) category = "C";
                        else if (prefix === 35) category = "D";
                        else if (prefix >= 36 && prefix <= 39) category = "E";
                        else if (prefix >= 41 && prefix <= 42) category = "F";
                        else if (prefix >= 45 && prefix <= 47) category = "G";
                        else if (prefix >= 49 && prefix <= 52) category = "H";
                        else if (prefix >= 55 && prefix <= 56) category = "I";
                        else if (prefix >= 58 && prefix <= 63) category = "J";
                        else if (prefix >= 64 && prefix <= 66) category = "K";
                        else if (prefix === 68) category = "L";
                        else if (prefix >= 70 && prefix <= 73) category = "M";
                        else if (prefix >= 74 && prefix <= 76) category = "N";
                        else if (prefix === 84) category = "O";
                        else if (prefix === 85) category = "P";
                        else if (prefix >= 86 && prefix <= 87) category = "Q";
                        else if (prefix >= 90 && prefix <= 91) category = "R";
                        else if (prefix >= 94 && prefix <= 96) category = "S";
                        else if (prefix >= 97 && prefix <= 98) category = "T";
                        else if (prefix === 99) category = "U";

                        if (category) document.getElementById("industry").value = category;
                    }

                    bizHelper.textContent = saeopjangNm ? `'${saeopjangNm}' 정보가 채워졌습니다.` : "조회 및 자동 채움 완료!";
                    bizHelper.style.color = "var(--accent-dark)";
                } catch (e) {
                    bizHelper.textContent = "API 조회 중 오류가 발생했습니다. 직접 입력해주세요.";
                    bizHelper.style.color = "var(--error)";
                    console.error(e);
                } finally {
                    fetchBtn.disabled = false;
                }
            });

            // 임금 입력 콤마 포맷
            const wageInput = document.getElementById("wage");
            const wageHelper = document.getElementById("wage-helper");
            wageInput.addEventListener("input", e => {
                const raw = parseKRW(e.target.value);
                if (raw > 0) {
                    e.target.value = raw.toLocaleString("ko-KR");
                    wageHelper.textContent = "→ 약 " + formatKRWShort(raw);
                } else {
                    e.target.value = "";
                    wageHelper.textContent = "";
                }
            });

            // 추정 모드 체크박스
            const estimateCheckbox = document.getElementById("estimate-mode");
            const wageRequiredMark = document.getElementById("wage-required");
            estimateCheckbox.addEventListener("change", e => {
                if (e.target.checked) {
                    wageInput.disabled = true;
                    wageInput.value = "";
                    wageHelper.textContent = "통계 기반 추정값으로 계산됩니다";
                    wageRequiredMark.style.display = "none";
                } else {
                    wageInput.disabled = false;
                    wageHelper.textContent = "";
                    wageRequiredMark.style.display = "inline";
                }
            });

            // 폼 제출
            const errorMsg = document.getElementById("error-msg");
            document.getElementById("submit-btn").addEventListener("click", () => {
                const industryCode = industrySelect.value;
                const employeeCount = parseInt(document.getElementById("employees").value, 10);
                const isEstimate = estimateCheckbox.checked;
                const annualWageTotal = parseKRW(wageInput.value);

                errorMsg.style.display = "none";
                if (!industryCode) return showError("업종을 선택해주세요.");
                if (!employeeCount || employeeCount < 1) return showError("상시근로자 수를 1명 이상으로 입력해주세요.");
                if (!isEstimate && (!annualWageTotal || annualWageTotal < 1)) {
                    return showError("1년간 임금총액을 입력하거나, '임금총액을 모르겠어요'를 체크해주세요.");
                }

                const result = calculateLimit({
                    industryCode,
                    employeeCount,
                    annualWageTotal: isEstimate ? undefined : annualWageTotal,
                    estimateMode: isEstimate
                });

                renderResult(result);
            });

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.style.display = "block";
            }
        });

        // ============================================================
        // 결과 렌더링
        // ============================================================

        function renderResult(result) {
            const container = document.getElementById("result-container");
            container.innerHTML = "";

            const card = document.createElement("div");
            card.className = "result";

            // 사업장 정보
            const infoLine = document.createElement("div");
            infoLine.className = "info-line";
            infoLine.innerHTML = "<strong>" + result.industryName + " (" + result.industryCode + ")</strong> · 상시근로자 " + result.employeeCount.toLocaleString("ko-KR") + "명";
            card.appendChild(infoLine);

            const badges = document.createElement("div");
            badges.className = "meta-row";
            badges.style.marginTop = "10px";
            badges.innerHTML = result.isPriority
                ? '<span class="badge badge-priority">우선지원대상기업</span>'
                : '<span class="badge badge-non-priority">비우선지원대상기업</span>';
            badges.innerHTML += '<span class="badge badge-rate">' + result.rateLabel + '</span>';
            card.appendChild(badges);

            card.appendChild(makeDivider());

            // 환급 한도
            const labelEl = document.createElement("div");
            labelEl.className = "result-label";
            labelEl.textContent = result.mode === "estimate" ? "환급 한도 (추정)" : "환급 한도";
            card.appendChild(labelEl);

            if (result.mode === "estimate") {
                const range = result.estimatedLimitRange;
                const amount = document.createElement("div");
                amount.className = "result-amount-range";
                amount.textContent = formatKRWShort(range.min) + " ~ " + formatKRWShort(range.max);
                card.appendChild(amount);

                const avg = document.createElement("div");
                avg.className = "result-avg";
                avg.textContent = "중간값: " + formatKRWShort(range.avg);
                card.appendChild(avg);
            } else {
                const amount = document.createElement("div");
                amount.className = "result-amount";
                amount.textContent = formatKRW(result.appliedLimit);
                card.appendChild(amount);

                const sub = document.createElement("div");
                sub.className = "result-avg";
                sub.textContent = formatKRWShort(result.appliedLimit);
                card.appendChild(sub);
            }

            // 안내 메시지: 500만원 최소 보장
            if (result.isMinimumGuaranteeApplied) {
                const notice = document.createElement("div");
                notice.className = "notice notice-warn";
                notice.textContent = "우선지원대상기업 최소 500만 원 보장 적용";
                card.appendChild(notice);
            }

            // 안내 메시지: 비우선지원 예외 안내
            if (!result.isPriority) {
                const nonPriorityNotice = document.createElement("div");
                nonPriorityNotice.className = "notice notice-info";
                nonPriorityNotice.innerHTML =
                    '<strong>비우선지원대상기업으로 240% 한도 미적용. 100% 한도 적용</strong>' +
                    '<div style="margin-top:12px; padding: 12px; background: #fff5f5; color: var(--error); border-radius: 6px; font-weight: 600; font-size: 14px; border: 1px solid #feb2b2; line-height: 1.4;">단, 본 도구는 근로자 수 기준만으로 판정하므로 다음 경우 우선지원대상기업으로 인정될 수 있습니다.</div>' +
                    '<ul style="margin-top: 10px;">' +
                    '<li>중소기업기본법상 중소기업으로 인정되는 경우 (매출액·자산총액 기준)</li>' +
                    '<li>이전에 우선지원대상이었다가 규모 확대로 해당하지 않게 된 후 5년 이내인 경우</li>' +
                    '</ul>' +
                    '<a class="check-link" style="font-size: 15px;" href="' + PRIORITY_CHECK_URL + '" target="_blank" rel="noopener noreferrer">고용24에서 정확하게 조회하기 →</a>';
                card.appendChild(nonPriorityNotice);
            }

            // 안내 메시지: 추정 모드
            if (result.mode === "estimate") {
                const estimateNotice = document.createElement("div");
                estimateNotice.className = "notice notice-info";
                estimateNotice.textContent = "통계 기반 추정값입니다. 회사별 실제 임금 수준에 따라 큰 오차가 발생할 수 있으니, 정확한 한도는 임금총액 직접 입력 시 산출됩니다.";
                card.appendChild(estimateNotice);
            }

            // 산정 근거 토글
            const toggleBtn = document.createElement("button");
            toggleBtn.className = "breakdown-toggle";
            toggleBtn.innerHTML = '<span>산정 근거 보기</span><span class="chevron">▼</span>';
            card.appendChild(toggleBtn);

            const breakdown = document.createElement("div");
            breakdown.className = "breakdown";
            result.breakdown.forEach((step, i) => {
                const row = document.createElement("div");
                row.className = "breakdown-step";
                row.innerHTML =
                    '<div class="step-num">' + (i + 1) + '.</div>' +
                    '<div class="step-content">' + step.label + '<div class="step-formula">' + step.formula + '</div></div>';
                breakdown.appendChild(row);
            });

            const source = document.createElement("div");
            source.className = "breakdown-source";
            source.textContent = "근거: 고용보험법 시행령 제12조 및 별표 1 (보험요율 및 우선지원대상기업), 한국산업인력공단 사업주직업능력개발훈련 환급 안내 (240% 한도 및 500만 원 최소 보장)";
            breakdown.appendChild(source);
            card.appendChild(breakdown);

            toggleBtn.addEventListener("click", () => {
                toggleBtn.classList.toggle("open");
                breakdown.classList.toggle("open");
            });

            // CTA
            const cta = document.createElement("div");
            cta.className = "cta";
            cta.innerHTML = '<a class="cta-button" style="color: #ffffff !important;" href="' + CONSULT_URL + '" target="_blank" rel="noopener noreferrer">에이블런 인재키움 상담 신청 →</a>';
            card.appendChild(cta);

            container.appendChild(card);
            card.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function makeDivider() {
            const hr = document.createElement("hr");
            hr.className = "divider";
            return hr;
        }
    </script>

</body>

</html>
